<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feliz 10 meses</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #ffe4f1, #fff8dc);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 150vh;
      padding: 200px;
    }

    .card {
      background: rgba(255,255,255,0.9);
      border-radius: 22px;
      box-shadow: 0 5px 35px rgba(0,0,0,0.15);
      max-width: 788px;
      width: 150%;
      padding: 100px;
      text-align: center; title: "Feliz 10 meses";
    }

    h1 {
      color: #d94f8f;
      font-size: 2.4rem;
      margin-bottom: 12px;
    }

    .decor {
      margin: 20px 0 28px;
      display: flex;
      justify-content: center;
    }

    .message {
      font-size: 1.08rem;
      line-height: 1.8;
      color: #5b3b4d;
      text-align: justify;
      padding: 0 8px;
    }

    .image-container {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Feliz 10 meses</h1>

    <div class="decor">
      <svg width="320" height="220" viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="0" width="320" height="220" fill="none"/>

        <!-- confeti -->
        <circle cx="50" cy="40" r="4" fill="#ff6b6b"/>
        <circle cx="95" cy="70" r="4" fill="#ffd166"/>
        <circle cx="270" cy="45" r="4" fill="#4ecdc4"/>
        <circle cx="230" cy="80" r="4" fill="#ff9f1c"/>
        <circle cx="70" cy="120" r="4" fill="#7b61ff"/>
        <circle cx="250" cy="120" r="4" fill="#ff6b6b"/>
        <circle cx="140" cy="30" r="4" fill="#ff85c0"/>
        <circle cx="180" cy="95" r="4" fill="#4ecdc4"/>

        <!-- flores -->
        <g transform="translate(60,150)">
          <circle cx="0" cy="0" r="10" fill="#ff7aa2"/>
          <circle cx="-14" cy="-6" r="10" fill="#ff9ec3"/>
          <circle cx="14" cy="-6" r="10" fill="#ff9ec3"/>
          <circle cx="-8" cy="12" r="10" fill="#ffb3c6"/>
          <circle cx="8" cy="12" r="10" fill="#ffb3c6"/>
          <circle cx="0" cy="-16" r="8" fill="#ffd166"/>
        </g>

        <g transform="translate(250,150)">
          <circle cx="0" cy="0" r="10" fill="#ff7aa2"/>
          <circle cx="-14" cy="-6" r="10" fill="#ff9ec3"/>
          <circle cx="14" cy="-6" r="10" fill="#ff9ec3"/>
          <circle cx="-8" cy="12" r="10" fill="#ffb3c6"/>
          <circle cx="8" cy="12" r="10" fill="#ffb3c6"/>
          <circle cx="0" cy="-16" r="8" fill="#ffd166"/>
        </g>

        <!-- globos en forma de corazón -->
        <path d="M160 90
                 C145 60, 110 60, 110 90
                 C110 120, 160 150, 160 175
                 C160 150, 210 120, 210 90
                 C210 60, 175 60, 160 90 Z"
              fill="#ff5d8f" opacity="0.95"/>
        <path d="M160 90
                 C145 60, 110 60, 110 90
                 C110 120, 160 150, 160 175
                 C160 150, 210 120, 210 90
                 C210 60, 175 60, 160 90 Z"
              fill="none" stroke="#d63c73" stroke-width="3"/>
      </svg>
    </div>

    <p class="message">
      hoy celebramos 10 meses y que mejor manera de expresartelo que con un pequeño detalle, echo por mi 
      con todo lo aprendido en este tiempo, que estuvimos lejos eres la mejor novia del mundo y se que asi tambien sera cuando seas mi esposa
      te amo millones mi niña linda
      <span class="heart">♡</span>
    </p>
    <img src="yesft.html" width="50">

  </div>
</body>
</html>
